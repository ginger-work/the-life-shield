# Alembic Configuration File — The Life Shield
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration environment
script_location = migrations

# Template for revision files
# file_template = %%(rev)s_%%(slug)s

# Logging to console only (structured logging handled by app)
prepend_sys_path = .

# Version path (one directory)
version_path_separator = os

sqlalchemy.url = postgresql://lifeshield:devpassword123@localhost:5432/lifeshield_dev

[post_write_hooks]
# Optional: run black on generated migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
