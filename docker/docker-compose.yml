# ============================================================
# The Life Shield — Local Development Docker Compose
# Usage: make up | docker compose -f docker/docker-compose.yml up
# ============================================================

version: "3.9"

# ------------------------------------
# Named Volumes
# ------------------------------------
volumes:
  postgres_data:
    name: lifeshield_postgres_data
  redis_data:
    name: lifeshield_redis_data
  app_logs:
    name: lifeshield_app_logs
  media_files:
    name: lifeshield_media_files

# ------------------------------------
# Networks
# ------------------------------------
networks:
  backend:
    name: lifeshield_backend
    driver: bridge
  frontend:
    name: lifeshield_frontend
    driver: bridge

# ------------------------------------
# Services
# ------------------------------------
services:

  # ---- PostgreSQL (Primary DB) ----
  db:
    image: postgres:15-alpine
    container_name: lifeshield_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifeshield_dev}
      POSTGRES_USER: ${POSTGRES_USER:-lifeshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lifeshield} -d ${POSTGRES_DB:-lifeshield_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Redis (Cache & Queue) ----
  redis:
    image: redis:7-alpine
    container_name: lifeshield_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redisdevpass}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redisdevpass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---- FastAPI Application ----
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: lifeshield_api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      # Override for Docker networking
      DATABASE_URL: postgresql://${POSTGRES_USER:-lifeshield}:${POSTGRES_PASSWORD:-devpassword123}@db:5432/${POSTGRES_DB:-lifeshield_dev}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redisdevpass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redisdevpass}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redisdevpass}@redis:6379/2
      ENVIRONMENT: development
      DEBUG: "true"
    volumes:
      - ..:/app
      - app_logs:/app/logs
      - media_files:/app/media
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ---- Celery Worker (Async Tasks) ----
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: lifeshield_worker
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lifeshield}:${POSTGRES_PASSWORD:-devpassword123}@db:5432/${POSTGRES_DB:-lifeshield_dev}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redisdevpass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redisdevpass}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redisdevpass}@redis:6379/2
      ENVIRONMENT: development
    volumes:
      - ..:/app
      - app_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - backend

  # ---- Celery Beat (Scheduled Tasks) ----
  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: lifeshield_scheduler
    restart: unless-stopped
    command: celery -A app.celery_app beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lifeshield}:${POSTGRES_PASSWORD:-devpassword123}@db:5432/${POSTGRES_DB:-lifeshield_dev}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redisdevpass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redisdevpass}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redisdevpass}@redis:6379/2
      ENVIRONMENT: development
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  # ---- Nginx (Reverse Proxy) ----
  nginx:
    image: nginx:1.25-alpine
    container_name: lifeshield_nginx
    restart: unless-stopped
    volumes:
      - ../nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - media_files:/var/www/media:ro
      - app_logs:/var/log/nginx
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
